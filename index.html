<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Doodles">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Doodle Infinity</title>
<style>
  :root{
    --paper:#FAF7F1; --ink:#2B2926; --tray:#FFFFFF;
    --shadow:0 6px 24px rgba(43,41,38,.14), 0 1px 3px rgba(43,41,38,.10);
    --radius:22px; --accent:#FF7A59;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none;background:var(--paper);
    font-family:ui-rounded,-apple-system,"SF Pro Rounded","Segoe UI",system-ui,sans-serif}
  #c{position:fixed;inset:0;touch-action:none;cursor:crosshair}

  .bar{position:fixed;top:calc(env(safe-area-inset-top,0px) + 12px);left:50%;transform:translateX(-50%);
    display:flex;gap:6px;background:var(--tray);border-radius:var(--radius);padding:7px;box-shadow:var(--shadow);z-index:10}
  .bar button{width:48px;height:48px;border:none;background:transparent;border-radius:16px;
    display:flex;align-items:center;justify-content:center;color:var(--ink);transition:transform .12s ease, background .15s}
  .bar button:active{transform:scale(.86);background:#F1EDE6}
  .bar button[disabled]{opacity:.25}
  .bar button.warn{color:#D0432B}
  .bar svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
  #zoomLbl{position:fixed;top:calc(env(safe-area-inset-top,0px) + 76px);left:50%;transform:translateX(-50%);
    font-size:12px;font-weight:700;color:#A39B8D;letter-spacing:.04em;z-index:10;opacity:0;transition:opacity .3s;pointer-events:none}

  .tray{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 12px);left:50%;transform:translateX(-50%);
    max-width:96vw;display:flex;align-items:center;gap:8px;background:var(--tray);
    border-radius:28px;padding:9px 12px;box-shadow:var(--shadow);z-index:10;overflow-x:auto;scrollbar-width:none}
  .tray::-webkit-scrollbar{display:none}
  .divider{width:2px;height:38px;background:#EFEAE1;border-radius:2px;flex:0 0 auto}

  /* current colour button opens the shade grid */
  #swatch{flex:0 0 auto;width:48px;height:48px;border-radius:50%;border:3px solid #E5E0D6;
    transition:transform .12s;position:relative}
  #swatch:active{transform:scale(.88)}
  #swatch::after{content:"";position:absolute;right:-2px;bottom:-2px;width:18px;height:18px;border-radius:50%;
    background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);
    background-image:linear-gradient(45deg,#E2452F 0 25%,#F5A623 25% 50%,#5BBF4E 50% 75%,#2D7FF9 75% 100%)}

  .sizes{display:flex;gap:5px;flex:0 0 auto}
  .size{width:42px;height:46px;border-radius:14px;border:none;background:transparent;
    display:flex;align-items:center;justify-content:center;transition:background .15s, transform .12s}
  .size:active{transform:scale(.86)}
  .size.sel{background:#F1EDE6}
  .size i{display:block;border-radius:50%;background:var(--ink)}

  .texs{display:flex;gap:4px;flex:0 0 auto}
  .tex{width:50px;height:54px;border:none;background:transparent;border-radius:14px;flex:0 0 auto;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    color:#8A8275;transition:background .15s, transform .12s}
  .tex:active{transform:scale(.88)}
  .tex.sel{background:#F1EDE6;color:var(--ink)}
  .tex span{font-size:10px;font-weight:700;letter-spacing:.01em}
  .glyph{width:26px;height:14px;display:block}
  .g-ink{height:8px;border-radius:8px;background:var(--ink)}
  .g-marker{height:13px;border-radius:4px;background:var(--ink);opacity:.82}
  .g-pencil{height:10px;border-radius:8px;background:var(--ink);
    -webkit-mask-image:repeating-radial-gradient(circle at 3px 3px,#000 0 .7px,transparent .7px 2.2px);
    mask-image:repeating-radial-gradient(circle at 3px 3px,#000 0 .7px,transparent .7px 2.2px)}
  .g-crayon{height:13px;border-radius:5px;background:var(--ink);
    -webkit-mask-image:repeating-linear-gradient(60deg,#000 0 2px,transparent 2px 3.5px);
    mask-image:repeating-linear-gradient(60deg,#000 0 2px,transparent 2px 3.5px)}
  .g-water{height:14px;border-radius:50%;background:radial-gradient(circle,var(--ink) 10%,rgba(43,41,38,.25) 70%,transparent 100%)}

  .eraser{width:48px;height:54px;border:none;background:transparent;border-radius:14px;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;color:var(--ink);transition:background .15s, transform .12s}
  .eraser:active{transform:scale(.86)}
  .eraser.sel{background:#FFE6DE;color:var(--accent)}
  .eraser svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

  /* shade grid panel */
  .palette{position:fixed;left:50%;transform:translateX(-50%) translateY(10px);
    bottom:calc(env(safe-area-inset-bottom,0px) + 84px);
    background:var(--tray);border-radius:24px;padding:14px;box-shadow:var(--shadow);z-index:11;
    max-width:94vw;max-height:52vh;overflow:auto;scrollbar-width:none;
    display:none;opacity:0;transition:opacity .18s, transform .18s}
  .palette::-webkit-scrollbar{display:none}
  .palette.open{display:block;opacity:1;transform:translateX(-50%) translateY(0)}
  .grid{display:grid;grid-template-columns:repeat(13,1fr);gap:7px}
  .sw{width:34px;height:34px;border-radius:10px;border:3px solid transparent;transition:transform .12s, border-color .12s}
  .sw:active{transform:scale(.84)}
  .sw.sel{border-color:var(--ink);transform:scale(1.08)}
  .sw[data-light="1"]{box-shadow:inset 0 0 0 1px #E5E0D6}

  .toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 100px);left:50%;
    transform:translateX(-50%) translateY(8px);background:var(--ink);color:#FFF;font-size:14px;font-weight:600;
    padding:10px 18px;border-radius:999px;opacity:0;transition:opacity .25s, transform .25s;pointer-events:none;z-index:20}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion: reduce){*{transition:none !important}}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="bar">
  <button id="undoB" aria-label="Undo"><svg viewBox="0 0 24 24"><path d="M9 14 4 9l5-5"/><path d="M4 9h10a6 6 0 0 1 0 12h-3"/></svg></button>
  <button id="redoB" aria-label="Redo"><svg viewBox="0 0 24 24"><path d="m15 14 5-5-5-5"/><path d="M20 9H10a6 6 0 0 0 0 12h3"/></svg></button>
  <button id="homeB" aria-label="Fit drawing"><svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5.5 9.5V21h13V9.5"/></svg></button>
  <button id="importB" aria-label="Load a picture"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2.5"/><path d="m4 17 5-5 4 4 3-3 4 4"/><circle cx="9" cy="9" r="1.6"/></svg></button>
  <button id="saveB" aria-label="Save picture"><svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M4 21h16"/></svg></button>
  <button id="clearB" class="warn" aria-label="Clear drawing"><svg viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M9 7V4h6v3"/><path d="M6 7l1 13h10l1-13"/></svg></button>
  <button id="newB" aria-label="New sheet"><svg viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M12 11v6M9 14h6"/></svg></button>
</div>
<input type="file" id="file" accept="image/*" style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none">
<div id="zoomLbl">100%</div>

<div class="palette" id="palette"><div class="grid" id="grid"></div></div>

<div class="tray">
  <button id="swatch" aria-label="Choose colour"></button>
  <div class="divider"></div>
  <div class="sizes" id="sizes"></div>
  <div class="divider"></div>
  <div class="texs" id="texs"></div>
  <div class="divider"></div>
  <button class="eraser" id="eraserB" aria-label="Eraser"><svg viewBox="0 0 24 24"><path d="m8.5 19.5-4.7-4.7a2 2 0 0 1 0-2.8l8-8a2 2 0 0 1 2.8 0l5.4 5.4a2 2 0 0 1 0 2.8l-7.3 7.3"/><path d="M6 21h14"/></svg></button>
</div>
<div class="toast" id="toast"></div>

<script>
(() => {
"use strict";

/* ============================== config ============================== */
const SIZES = [3, 6, 12, 22, 40, 64];
const ERASER_MULT = 2.4;
const TEXTURES = [
  { id:"ink",    label:"Ink"    },
  { id:"marker", label:"Marker" },
  { id:"pencil", label:"Pencil" },
  { id:"crayon", label:"Crayon" },
  { id:"water",  label:"Water"  }
];
// 13 hues across the rainbow, plus a neutrals/extras row
const HUES = [4,22,38,50,68,140,168,190,210,232,260,286,320];
const SHADES = [   // [lightness, saturation]
  [86,72],[72,80],[58,82],[44,78],[30,66]
];
const NEUTRALS = ["#FFFFFF","#E9E3D8","#C9C1B2","#A39B8D","#7C7367","#544D44","#312C26","#000000",
                  "#6B4A2F","#9C6B43","#C98D5E","#E8B98C","#F3D9B8"];

let strokes = [], ops = [], redos = [];
let bgImage = null, bgRect = null;     // imported PNG/photo, placed in world coords
let color = "#2B2926", sizeIx = 1, texture = "ink", erasing = false;
let scale = 1, ox = 0, oy = 0;
const MIN_S = 0.01, MAX_S = 300;          // 1% .. 30,000%

const cv = document.getElementById("c");
const ctx = cv.getContext("2d");
const paint = document.createElement("canvas");
const pctx = paint.getContext("2d");
const tmp = document.createElement("canvas");      // scratch layer for textured brushes
const tctx = tmp.getContext("2d");
let dpr = 1, W = 0, H = 0;
const clamp = (v,a,b) => Math.min(Math.max(v,a),b);

/* ============================== canvas setup ============================== */
function resize(){
  dpr = Math.min(window.devicePixelRatio || 1, 3);
  W = window.innerWidth; H = window.innerHeight;
  for (const [el,c2] of [[cv,ctx],[paint,pctx],[tmp,tctx]]){
    el.width = Math.round(W*dpr); el.height = Math.round(H*dpr);
    c2.setTransform(dpr,0,0,dpr,0,0);
  }
  cv.style.width = W+"px"; cv.style.height = H+"px";
  renderAll();
}
window.addEventListener("resize", resize);

/* ============================== grain tiles ============================== */
function makeGrain(size, count, minA, maxA, maxR){
  const t = document.createElement("canvas"); t.width = t.height = size;
  const g = t.getContext("2d");
  for (let i=0;i<count;i++){
    const x = Math.random()*size, y = Math.random()*size;
    const r = maxR <= 1 ? 0.6 : (0.6 + Math.random()*(maxR-0.6));
    g.globalAlpha = minA + Math.random()*(maxA-minA);
    g.fillStyle = "#000";
    g.beginPath(); g.arc(x,y,r,0,6.2832); g.fill();
  }
  return t;
}
const grainTile = {
  pencil: makeGrain(64, 2200, 0.25, 0.7, 1),
  crayon: makeGrain(80, 520, 0.3, 0.62, 3.4)
};
const grainPat = {};   // lazy CanvasPattern cache (on tctx)
function grainPattern(tex){
  if (!grainPat[tex]) grainPat[tex] = tctx.createPattern(grainTile[tex], "repeat");
  return grainPat[tex];
}

/* ============================== geometry ============================== */
const toScreen = (x,y) => [x*scale+ox, y*scale+oy];
const toWorld  = (x,y) => [(x-ox)/scale, (y-oy)/scale];

// Build a smooth Path2D (screen space) from a stroke's world points.
function buildPath(s){
  const p = s.pts, n = p.length/3, path = new Path2D();
  if (n === 1){
    const [x,y] = toScreen(p[0],p[1]);
    path.arc(x, y, Math.max(s.w*scale,.5)/2, 0, 6.2832);
    return { path, dot:true };
  }
  let [x0,y0] = toScreen(p[0],p[1]); path.moveTo(x0,y0);
  for (let i=1;i<n;i++){
    const [ax,ay] = toScreen(p[(i-1)*3], p[(i-1)*3+1]);
    const [bx,by] = toScreen(p[i*3], p[i*3+1]);
    path.quadraticCurveTo(ax, ay, (ax+bx)/2, (ay+by)/2);
  }
  const [lx,ly] = toScreen(p[(n-1)*3], p[(n-1)*3+1]);
  path.lineTo(lx, ly);
  return { path, dot:false };
}
function body(c2, P, w){
  if (P.dot){ c2.fill(P.path); }
  else { c2.lineWidth = Math.max(w,.5); c2.stroke(P.path); }
}

/* ============================== per-texture rendering ============================== */
function renderEraser(s){
  const P = buildPath(s);
  pctx.save();
  pctx.globalCompositeOperation = "destination-out";
  pctx.lineCap = pctx.lineJoin = "round"; pctx.strokeStyle = pctx.fillStyle = "#000";
  body(pctx, P, s.w*scale);
  pctx.restore();
}
// Smooth ink: per-segment so width can taper with pressure/velocity.
function renderInk(s){
  pctx.save();
  pctx.globalCompositeOperation = "source-over";
  pctx.strokeStyle = pctx.fillStyle = s.c; pctx.lineCap = pctx.lineJoin = "round";
  const p = s.pts, n = p.length/3;
  if (n === 1){
    const [sx,sy] = toScreen(p[0],p[1]);
    pctx.beginPath(); pctx.arc(sx,sy,Math.max(p[2]*scale,.4)/2,0,6.2832); pctx.fill();
    pctx.restore(); return;
  }
  for (let i=1;i<n;i++){
    const ax=p[(i-1)*3], ay=p[(i-1)*3+1];
    const bx=p[i*3], by=p[i*3+1], bw=p[i*3+2];
    const pmx = i===1?ax:(ax+p[(i-2)*3])/2, pmy = i===1?ay:(ay+p[(i-2)*3+1])/2;
    const [s0x,s0y]=toScreen(pmx,pmy), [scx,scy]=toScreen(ax,ay), [s1x,s1y]=toScreen((ax+bx)/2,(ay+by)/2);
    pctx.lineWidth = Math.max(bw*scale,.4);
    pctx.beginPath(); pctx.moveTo(s0x,s0y); pctx.quadraticCurveTo(scx,scy,s1x,s1y); pctx.stroke();
  }
  const lx=p[(n-1)*3], ly=p[(n-1)*3+1], lw=p[(n-1)*3+2], px2=p[(n-2)*3], py2=p[(n-2)*3+1];
  const [t0x,t0y]=toScreen((lx+px2)/2,(ly+py2)/2), [t1x,t1y]=toScreen(lx,ly);
  pctx.lineWidth = Math.max(lw*scale,.4);
  pctx.beginPath(); pctx.moveTo(t0x,t0y); pctx.lineTo(t1x,t1y); pctx.stroke();
  pctx.restore();
}
function paintTexture(s){
  const P = buildPath(s), w = Math.max(s.w*scale,.5);
  if (s.tex === "marker"){
    pctx.save(); pctx.globalCompositeOperation="source-over"; pctx.globalAlpha=.8;
    pctx.strokeStyle = pctx.fillStyle = s.c; pctx.lineCap = pctx.lineJoin = "round";
    body(pctx, P, w); pctx.restore(); return;
  }
  if (s.tex === "water"){
    pctx.save(); pctx.globalCompositeOperation="source-over";
    pctx.strokeStyle = pctx.fillStyle = s.c; pctx.lineCap = pctx.lineJoin = "round";
    for (const [k,a] of [[1.7,.05],[1.15,.07],[.65,.12]]){ pctx.globalAlpha=a; body(pctx,P,w*k); }
    pctx.restore(); return;
  }
  // pencil / crayon — render on scratch layer then knock out grain, so it never erases art beneath
  tctx.save(); tctx.setTransform(dpr,0,0,dpr,0,0); tctx.clearRect(0,0,W,H);
  tctx.lineCap = tctx.lineJoin = "round"; tctx.globalCompositeOperation="source-over";
  tctx.strokeStyle = tctx.fillStyle = s.c; tctx.globalAlpha = s.tex==="crayon"?.95:.9;
  const tw = s.tex==="crayon" ? w*1.1 : w*0.85;
  body(tctx, P, tw);
  tctx.globalAlpha = 1; tctx.globalCompositeOperation="destination-out";
  tctx.strokeStyle = tctx.fillStyle = grainPattern(s.tex);
  body(tctx, P, tw);
  tctx.restore();
  pctx.save(); pctx.setTransform(1,0,0,1,0,0); pctx.globalCompositeOperation="source-over"; pctx.globalAlpha=1;
  pctx.drawImage(tmp, 0, 0); pctx.restore();
}
function renderStroke(s){
  if (s.e) return renderEraser(s);
  if (!s.tex || s.tex === "ink") return renderInk(s);
  return paintTexture(s);
}

let raf = 0;
function renderAll(){
  pctx.save(); pctx.setTransform(1,0,0,1,0,0); pctx.clearRect(0,0,paint.width,paint.height); pctx.restore();
  for (const s of strokes) renderStroke(s);
  blit();
}
function scheduleRender(){ if (!raf) raf = requestAnimationFrame(()=>{ raf=0; renderAll(); }); }
const PAPER = getComputedStyle(document.documentElement).getPropertyValue("--paper").trim() || "#FAF7F1";
function blit(){
  ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,cv.width,cv.height); ctx.restore();
  ctx.fillStyle = PAPER; ctx.fillRect(0,0,W,H);
  if (bgImage && bgRect){
    const [sx,sy] = toScreen(bgRect.x, bgRect.y);
    ctx.drawImage(bgImage, sx, sy, bgRect.w*scale, bgRect.h*scale);
  }
  ctx.drawImage(paint,0,0,W,H);
}

/* ============================== live ink ============================== */
let live = null;
const sizeNow = () => SIZES[sizeIx] * (erasing ? ERASER_MULT : 1);

function widthFor(e, vx, vy){
  const base = sizeNow();
  if (e.pointerType === "pen" && e.pressure > 0) return base*(0.35 + e.pressure*1.35);
  const v = Math.hypot(vx,vy), t = Math.min(v/3.2,1);
  return base*(1.12 - t*0.5);
}
function previewStyle(){
  if (erasing) return null;
  switch(texture){
    case "marker": return { a:.55, w:1 };
    case "water":  return { a:.22, w:1.3 };
    case "pencil": return { a:.7,  w:.85 };
    case "crayon": return { a:.75, w:1.1 };
    default:       return { a:1,   w:1 };
  }
}
function strokeStart(e){
  const [wx,wy] = toWorld(e.clientX, e.clientY);
  const sw = sizeNow();             // chosen on-screen size in px
  const ww = sw / scale;            // convert to world units at the current zoom
  live = {
    stroke: { c: color, w: ww, e: erasing, tex: erasing?"ink":texture, pts:[wx,wy, ww*0.6] },
    px: e.clientX, py: e.clientY, t: e.timeStamp, smoothW: sw*0.6, moved: 0
  };
}
function strokeMove(e){
  if (!live) return;
  const evs = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  const ink = !live.stroke.e && live.stroke.tex === "ink";
  const pv = previewStyle();
  pctx.save();
  pctx.lineCap = pctx.lineJoin = "round";
  if (live.stroke.e){ pctx.globalCompositeOperation = "destination-out"; pctx.strokeStyle = "#000"; }
  else { pctx.globalCompositeOperation = "source-over"; pctx.strokeStyle = live.stroke.c; if (pv) pctx.globalAlpha = pv.a; }
  for (const ev of evs){
    const dx = ev.clientX-live.px, dy = ev.clientY-live.py, dist = Math.hypot(dx,dy);
    if (dist < 1.2) continue;
    const dt = Math.max(ev.timeStamp-live.t,1);
    const target = widthFor(ev, dx/dt*16, dy/dt*16);
    live.smoothW += (target-live.smoothW)*0.28;
    const [wx,wy] = toWorld(ev.clientX, ev.clientY), p = live.stroke.pts;
    p.push(wx, wy, live.smoothW/scale);
    const n = p.length/3;
    if (n >= 2){
      const ax=p[(n-2)*3], ay=p[(n-2)*3+1], bx=p[(n-1)*3], by=p[(n-1)*3+1], bw=p[(n-1)*3+2];
      const pmx = n===2?ax:(ax+p[(n-3)*3])/2, pmy = n===2?ay:(ay+p[(n-3)*3+1])/2;
      const [s0x,s0y]=toScreen(pmx,pmy), [scx,scy]=toScreen(ax,ay), [s1x,s1y]=toScreen((ax+bx)/2,(ay+by)/2);
      pctx.lineWidth = Math.max((ink ? bw : live.stroke.w*(pv?pv.w:1))*scale, .4);
      pctx.beginPath(); pctx.moveTo(s0x,s0y); pctx.quadraticCurveTo(scx,scy,s1x,s1y); pctx.stroke();
    }
    live.px = ev.clientX; live.py = ev.clientY; live.t = ev.timeStamp; live.moved += dist;
  }
  pctx.restore(); blit();
}
function strokeEnd(commit = true){
  if (!live) return;
  const s = live.stroke; live = null;
  if (!commit){ scheduleRender(); return; }
  if (s.pts.length === 3) s.pts[2] = (sizeNow()/scale)*0.9;     // a tap = a dot
  strokes.push(s); ops.push({t:"add"}); redos.length = 0;
  refreshBar(); queueSave();
  if (s.e || s.tex === "ink") { if (s.pts.length === 3) scheduleRender(); }
  else scheduleRender();                                 // textured: render clean final
}

/* ============================== pointers & gestures ============================== */
const touches = new Map();
let penDown = false, penActiveUntil = 0, gesture = null, drawPointer = null;

cv.addEventListener("pointerdown", e => {
  e.preventDefault();
  if (paletteOpen){ closePalette(); return; }    // tap-away closes the colour grid
  cv.setPointerCapture(e.pointerId);
  const now = performance.now();
  if (e.pointerType === "pen"){
    penDown = true; penActiveUntil = now+700; if (gesture) gesture = null;
    if (drawPointer !== null && live) strokeEnd(false);
    drawPointer = e.pointerId; strokeStart(e); return;
  }
  if (e.pointerType === "mouse"){ drawPointer = e.pointerId; strokeStart(e); return; }
  touches.set(e.pointerId, { x:e.clientX, y:e.clientY, t:now });
  if (penDown || now < penActiveUntil) return;
  if (touches.size === 1){ drawPointer = e.pointerId; strokeStart(e); }
  else if (touches.size === 2){
    if (drawPointer !== null && live && live.moved < 18) strokeEnd(false);
    else if (drawPointer !== null && live) strokeEnd(true);
    drawPointer = null;
    const [a,b] = [...touches.values()];
    gesture = { d0: Math.hypot(a.x-b.x,a.y-b.y)||1, s0:scale, ox0:ox, oy0:oy, cx:(a.x+b.x)/2, cy:(a.y+b.y)/2 };
  }
}, { passive:false });

cv.addEventListener("pointermove", e => {
  e.preventDefault();
  if (e.pointerId === drawPointer && live){ strokeMove(e); return; }
  if (touches.has(e.pointerId)){
    const t = touches.get(e.pointerId); t.x = e.clientX; t.y = e.clientY;
    if (gesture && touches.size >= 2){
      const [a,b] = [...touches.values()];
      const d = Math.hypot(a.x-b.x,a.y-b.y)||1, ncx=(a.x+b.x)/2, ncy=(a.y+b.y)/2;
      const ns = clamp(gesture.s0*(d/gesture.d0), MIN_S, MAX_S);
      const wx = (gesture.cx-gesture.ox0)/gesture.s0, wy = (gesture.cy-gesture.oy0)/gesture.s0;
      scale = ns; ox = ncx-wx*ns; oy = ncy-wy*ns;
      showZoom(); scheduleRender();
    }
  }
}, { passive:false });

function lift(e){
  if (e.pointerType === "pen"){ penDown = false; penActiveUntil = performance.now()+700; }
  if (e.pointerId === drawPointer){ strokeEnd(true); drawPointer = null; }
  if (touches.delete(e.pointerId) && touches.size < 2) gesture = null;
}
cv.addEventListener("pointerup", lift);
cv.addEventListener("pointercancel", e => {
  if (e.pointerType === "pen"){ penDown = false; penActiveUntil = performance.now()+700; }
  if (e.pointerId === drawPointer){ strokeEnd(true); drawPointer = null; }
  touches.delete(e.pointerId); if (touches.size < 2) gesture = null;
});
cv.addEventListener("wheel", e => {
  e.preventDefault();
  const f = Math.exp(-e.deltaY*0.0015), ns = clamp(scale*f, MIN_S, MAX_S);
  const wx=(e.clientX-ox)/scale, wy=(e.clientY-oy)/scale;
  scale = ns; ox = e.clientX-wx*ns; oy = e.clientY-wy*ns; showZoom(); scheduleRender();
}, { passive:false });

/* ============================== UI: palette ============================== */
const $ = id => document.getElementById(id);
const gridEl = $("grid"), paletteEl = $("palette"), swatchEl = $("swatch");
let paletteOpen = false;

function addSwatch(c, light){
  const b = document.createElement("button");
  b.className = "sw"; b.style.background = c; b.dataset.c = c.toUpperCase();
  if (light) b.dataset.light = "1";
  b.setAttribute("aria-label", "Colour " + c);
  b.addEventListener("click", () => pickColor(c.toUpperCase()));
  gridEl.appendChild(b);
}
NEUTRALS.forEach(c => addSwatch(c, /^#F|FFFFFF|E9E3D8/.test(c.toUpperCase())));
for (const [l,sat] of SHADES) for (const h of HUES){
  addSwatch(`hsl(${h} ${sat}% ${l}%)`, l >= 80);
}
function pickColor(c){
  color = c; erasing = false; eraserB.classList.remove("sel");
  swatchEl.style.background = c;
  gridEl.querySelectorAll(".sw").forEach(x => x.classList.toggle("sel", x.dataset.c === c.toUpperCase()));
  closePalette();
}
function openPalette(){ paletteOpen = true; paletteEl.classList.add("open"); }
function closePalette(){ paletteOpen = false; paletteEl.classList.remove("open"); }
swatchEl.style.background = color;
swatchEl.addEventListener("click", () => paletteOpen ? closePalette() : openPalette());

/* sizes */
const sizesEl = $("sizes");
SIZES.forEach((s,i) => {
  const b = document.createElement("button");
  b.className = "size" + (i===sizeIx?" sel":"");
  const dot = document.createElement("i"); const px = 6+i*6; dot.style.width = px+"px"; dot.style.height = px+"px";
  b.appendChild(dot); b.setAttribute("aria-label","Brush size "+(i+1));
  b.addEventListener("click", () => { sizeIx = i; sizesEl.querySelectorAll(".size").forEach((x,j)=>x.classList.toggle("sel",j===i)); });
  sizesEl.appendChild(b);
});

/* textures */
const texsEl = $("texs");
TEXTURES.forEach(t => {
  const b = document.createElement("button");
  b.className = "tex" + (t.id===texture?" sel":""); b.dataset.id = t.id;
  b.innerHTML = `<span class="glyph g-${t.id}"></span><span>${t.label}</span>`;
  b.setAttribute("aria-label", t.label + " brush");
  b.addEventListener("click", () => {
    texture = t.id; erasing = false; eraserB.classList.remove("sel");
    texsEl.querySelectorAll(".tex").forEach(x => x.classList.toggle("sel", x.dataset.id === t.id));
  });
  texsEl.appendChild(b);
});

/* eraser */
const eraserB = $("eraserB");
eraserB.addEventListener("click", () => { erasing = !erasing; eraserB.classList.toggle("sel", erasing); });

/* top bar */
const undoB=$("undoB"), redoB=$("redoB"), clearB=$("clearB");
function refreshBar(){ undoB.disabled = ops.length===0; redoB.disabled = redos.length===0; }
undoB.addEventListener("click", () => {
  const op = ops.pop(); if (!op) return;
  if (op.t==="add") redos.push({t:"add", s:strokes.pop()});
  else if (op.t==="clear"){ strokes = op.s; redos.push({t:"clear"}); }
  refreshBar(); scheduleRender(); queueSave();
});
redoB.addEventListener("click", () => {
  const op = redos.pop(); if (!op) return;
  if (op.t==="add"){ strokes.push(op.s); ops.push({t:"add"}); }
  else if (op.t==="clear"){ ops.push({t:"clear", s:strokes}); strokes = []; }
  refreshBar(); scheduleRender(); queueSave();
});
let clearArmed = 0;
clearB.addEventListener("click", () => {
  const now = performance.now();
  if (now-clearArmed > 2600){ clearArmed = now; toast("Tap again to clear everything"); return; }
  clearArmed = 0;
  if (strokes.length){ ops.push({t:"clear", s:strokes}); strokes = []; redos.length = 0; }
  refreshBar(); scheduleRender(); queueSave(); toast("All clear");
});
$("homeB").addEventListener("click", () => {
  if (!strokes.length){ scale=1; ox=0; oy=0; scheduleRender(); showZoom(); return; }
  let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  for (const s of strokes){ const p=s.pts; for (let i=0;i<p.length;i+=3){
    if(p[i]<x0)x0=p[i]; if(p[i]>x1)x1=p[i]; if(p[i+1]<y0)y0=p[i+1]; if(p[i+1]>y1)y1=p[i+1]; } }
  const pad = 60, s2 = clamp(Math.min(W/(x1-x0+pad*2), H/(y1-y0+pad*2)), MIN_S, MAX_S);
  scale = s2; ox = W/2-(x0+x1)/2*s2; oy = H/2-(y0+y1)/2*s2; scheduleRender(); showZoom();
});
$("saveB").addEventListener("click", () => {
  const out = document.createElement("canvas"); out.width = cv.width; out.height = cv.height;
  const o = out.getContext("2d"); o.fillStyle = "#FFFFFF"; o.fillRect(0,0,out.width,out.height);
  if (bgImage && bgRect){
    const [sx,sy] = toScreen(bgRect.x, bgRect.y);
    o.drawImage(bgImage, sx*dpr, sy*dpr, bgRect.w*scale*dpr, bgRect.h*scale*dpr);
  }
  o.drawImage(paint,0,0);
  out.toBlob(blob => {
    if (!blob) return;
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = "drawing-"+new Date().toISOString().slice(0,10)+".png";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),4000); toast("Picture saved");
  }, "image/png");
});

/* load a picture to draw on */
const fileInput = $("file");
$("importB").addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", () => {
  const f = fileInput.files && fileInput.files[0]; fileInput.value = "";
  if (!f) return;
  const url = URL.createObjectURL(f);
  const img = new Image();
  img.onload = () => {
    URL.revokeObjectURL(url);
    const fit = Math.min((W*0.82)/img.width, (H*0.82)/img.height);
    const dw = img.width*fit, dh = img.height*fit;               // screen px
    const cxw = (W/2-ox)/scale, cyw = (H/2-oy)/scale;            // view centre in world
    bgRect = { x: cxw-(dw/scale)/2, y: cyw-(dh/scale)/2, w: dw/scale, h: dh/scale };
    bgImage = img; scheduleRender(); queueSave(); toast("Picture loaded — draw on it!");
  };
  img.onerror = () => { URL.revokeObjectURL(url); toast("Couldn't load that picture"); };
  img.src = url;
});

/* new sheet — fresh page, double-tap to confirm */
let newArmed = 0;
$("newB").addEventListener("click", () => {
  const now = performance.now();
  if (now-newArmed > 2600){ newArmed = now; toast("Tap again for a new sheet — save first to keep this one!"); return; }
  newArmed = 0;
  strokes = []; ops = []; redos = []; bgImage = null; bgRect = null;
  scale = 1; ox = 0; oy = 0;
  refreshBar(); scheduleRender(); persist(); toast("New sheet");
});

const zoomLbl = $("zoomLbl"); let zoomT = 0;
function showZoom(){
  zoomLbl.textContent = (scale<0.1 ? (scale*100).toFixed(1) : Math.round(scale*100)) + "%";
  zoomLbl.style.opacity = 1; clearTimeout(zoomT); zoomT = setTimeout(()=>zoomLbl.style.opacity=0,900);
}
const toastEl = $("toast"); let toastT = 0;
function toast(msg){ toastEl.textContent = msg; toastEl.classList.add("show"); clearTimeout(toastT); toastT = setTimeout(()=>toastEl.classList.remove("show"),2200); }

/* ============================== autosave (device-local) ============================== */
const KEY = "doodle-infinity:v1";
const store = (() => {
  try { const t="__d__"; window.localStorage.setItem(t,"1"); window.localStorage.removeItem(t);
    return { get:k=>window.localStorage.getItem(k), set:(k,v)=>window.localStorage.setItem(k,v) }; }
  catch(_){ return null; }
})();
let saveT = 0;
function queueSave(){ clearTimeout(saveT); saveT = setTimeout(persist,900); }
function bgDataURL(){
  if (!bgImage) return null;
  try {
    const max = 1100;
    const r = Math.min(1, max/Math.max(bgImage.width, bgImage.height));
    const c = document.createElement("canvas");
    c.width = Math.round(bgImage.width*r); c.height = Math.round(bgImage.height*r);
    c.getContext("2d").drawImage(bgImage, 0, 0, c.width, c.height);
    return c.toDataURL("image/jpeg", 0.72);
  } catch(_){ return null; }
}
function persist(){
  if (!store) return;
  try {
    const slim = strokes.map(s => ({ c:s.c, e:s.e?1:0, t:s.tex||"ink", p:s.pts.map(v=>Math.round(v*10)/10) }));
    const bg = bgImage ? bgDataURL() : null;
    const pack = (incBg) => JSON.stringify({ s:slim, v:[scale,ox,oy], bg: incBg?bg:null, br: incBg?bgRect:null });
    let json = pack(true);
    if (json.length > 4_500_000) json = pack(false);              // drop photo if too big to store
    while (json.length > 4_500_000 && slim.length > 1){ slim.shift(); json = pack(false); }
    store.set(KEY, json);
  } catch(_){}
}
function restore(){
  if (!store) return;
  try {
    const raw = store.get(KEY); if (!raw) return;
    const d = JSON.parse(raw);
    strokes = (d.s||[]).map(o => ({ c:o.c, e:!!o.e, tex:o.t||"ink", w:0, pts:o.p }));
    if (d.v){ scale = clamp(d.v[0],MIN_S,MAX_S); ox = d.v[1]; oy = d.v[2]; }
    if (d.bg && d.br){
      const img = new Image();
      img.onload = () => { bgImage = img; bgRect = d.br; scheduleRender(); };
      img.src = d.bg;
    }
    refreshBar(); scheduleRender();
    if (strokes.length || d.bg) toast("Welcome back");
  } catch(_){}
}
if ("serviceWorker" in navigator){ try { navigator.serviceWorker.register("sw.js"); } catch(_){} }

/* ============================== go ============================== */
document.addEventListener("gesturestart", e => e.preventDefault());
document.addEventListener("dblclick", e => e.preventDefault());
resize(); refreshBar(); restore();
})();
</script>
</body>
</html>
